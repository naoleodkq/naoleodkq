<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form class="formCard">
        <label for="alname">Nome do Album:</label><br>
        <input type="text" id="fname" name="fname" placeholder="Ex. Donda"><br>
        <label for="lalbum">Link do Album:</label><br>
        <input type="url" id="lname" name="lname" placeholder="Ex. Link"><br>
        <label for="arname">Artista:</label><br>
        <input type="text" id="lname" name="lname" placeholder="Ex. Ye"><br>
        <label for="lname">Link do Artista:</label><br>
        <input type="url" id="lname" name="lname" placeholder="Ex. Link"><br>
        <label for="lname">Gênero:</label><br>
        <input type="text" id="lname" name="lname" placeholder="Ex. Hip Hop"><br>
        <label for="lname">Nota do Album:</label><br>
        <input type="text" id="lname" name="lname" placeholder="Ex. 10/10"><br>
        <label for="lname">Descrição do Album:</label><br>
        <input type="text" id="lname" name="lname" placeholder="Ex. Descrição"><br>
        <label for="lname">Imagem do Album:</label><br>
        <input type="file" id="lname" name="lname" placeholder="https://upload.wikimedia.org/wikipedia/commons/a/a0/Almost_black_square_020305.png"><br>
        <input type="submit" placeholder="Submeter">
      </form>
</body>
</html>
