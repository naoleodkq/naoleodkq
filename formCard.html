    <div class="containerForm">
		<h2 class="tituloForm">Criador de Card</h2></br>
        <form class="formCard" id="formCard">
			<div class="formDupla">
				<label for="nomeAlbum">Nome do Album:</label><br>
				<input type="text" id="nomeAlbum" name="fname" placeholder="Ex. Donda"><br>
			</div>
			<div class="formDupla">
				<label for="linkAlbum">Link do Album:</label><br>
				<input type="url" id="linkAlbum" name="lname" placeholder="Ex. Link"><br>
			</div>
			<div class="formDupla">
				<label for="nomeArtista">Artista:</label><br>
				<input type="text" id="nomeArtista" name="lname" placeholder="Ex. Ye"><br>
			</div>
			<div class="formDupla">
			<div class="formDupla">
				<label for="linkArtista">Link do Artista:</label><br>
				<input type="url" id="linkArtista" name="lname" placeholder="Ex. Link"><br>
			</div>
			<div class="formDupla">
				<label for="generoAlbum">Gênero:</label><br>
				<input type="text" id="generoAlbum" name="lname" placeholder="Ex. Hip Hop"><br>
			</div>
			<div class="formDupla">
				<label for="descricaoAlbum">Descrição do Album:</label><br>
				<input type="text" id="descricaoAlbum" name="lname" placeholder="Ex. Descrição"><br>
			</div>
			<div class="formDupla">
				<label for="imagemAlbum">Link da Imagem do Album:</label><br>
				<input type="url" id="imagemAlbum" name="lname" placeholder="https://upload.wikimedia.org/wikipedia/commons/a/a0/Almost_black_square_020305.png"><br>
			</div>
			<div class="formDupla">
				<label for="descricaoImagem">Descrição da Imagem do Album:</label><br>
				<input type="text" id="descricaoImagem" name="lname" placeholder="Imagem Divertida"><br>
			</div>
			<input class="btSubmit" type="submit" value="Criar">
        </form>
    </div>
	<div id="colecao"></div>
	
	<script src="script.js"></script>
</body>
</html>
